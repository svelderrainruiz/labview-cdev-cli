name: CI Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-pipeline:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Install-Module -Name Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
          }

      - name: Run full CLI contract tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-Pester -Path @(
            './tests/CdevCliContract.Tests.ps1',
            './tests/CdevCliInstallerContract.Tests.ps1',
            './tests/CdevCliLinuxContract.Tests.ps1',
            './tests/CdevCliCiContract.Tests.ps1',
            './tests/CdevCliSyncGuardContract.Tests.ps1'
          ) -CI -Output Detailed

  cli-contract:
    name: CLI Contract
    runs-on: ubuntu-latest
    needs: [ci-pipeline]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CLI help surface
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & pwsh -NoProfile -File ./scripts/Invoke-CdevCli.ps1 help
          if ($LASTEXITCODE -ne 0) { throw 'CLI help command failed.' }

  provenance-contract:
    name: Provenance Contract
    runs-on: ubuntu-latest
    needs: [cli-contract]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release assets and validate provenance files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:RUNNER_TEMP 'cli-release'
          & pwsh -NoProfile -File ./scripts/Invoke-CdevCli.ps1 release package --output-root $out
          if ($LASTEXITCODE -ne 0) { throw 'release package command failed.' }

          foreach ($asset in @(
            'cdev-cli-win-x64.zip',
            'cdev-cli-linux-x64.tar.gz',
            'cdev-cli.spdx.json',
            'cdev-cli.slsa.json'
          )) {
            $path = Join-Path $out $asset
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Missing release asset: $path"
            }
          }
